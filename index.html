<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPlayer</title>
  <link rel="icon" type="image/png" href="/public/icon.png">
  <style>
    /* 禁用右键菜单和文本选择 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    /* 浅色主题预加载样式 */
    body.theme-light,
    body.theme-light #app {
      background-color: #f5f5f5 !important;
      color: #333333 !important;
    }
    
    /* 深色主题预加载样式（默认） */
    body,
    body #app {
      background-color: #1a1a1a !important;
      color: #ffffff !important;
    }
  </style>
  <script>
    // 在页面加载时立即应用保存的主题，避免闪烁
    // 这个脚本必须在body标签可用后执行，所以使用document.documentElement
    (function() {
      try {
        var savedSettings = localStorage.getItem('tplayer-settings');
        if (savedSettings) {
          var settings = JSON.parse(savedSettings);
          var theme = settings.theme || 'dark';
          // 在html元素上设置data-theme属性
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (e) {
        // 忽略错误
      }
    })();
  </script>
</head>
<body oncontextmenu="return false;">
  <script>
    // 在body开始时立即添加主题类
    (function() {
      try {
        var savedSettings = localStorage.getItem('tplayer-settings');
        if (savedSettings) {
          var settings = JSON.parse(savedSettings);
          var theme = settings.theme || 'dark';
          if (theme === 'light') {
            document.body.classList.add('theme-light');
          }
        }
      } catch (e) {
        // 忽略错误
      }
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
