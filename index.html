<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPlayer</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    /* 禁用右键菜单和文本选择 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    /* 浅色主题预加载样式 */
    body.theme-light,
    body.theme-light #app {
      background-color: #f5f5f5 !important;
      color: #333333 !important;
    }
    
    /* 深色主题预加载样式（默认） */
    body,
    body #app {
      background-color: #1a1a1a !important;
      color: #ffffff !important;
    }
  </style>
  <script>
    // 在页面加载的最早阶段读取并应用用户的主题设置，避免主题切换闪烁
    (function() {
      // 立即读取用户设置
      var savedSettings = localStorage.getItem('tplayer-settings');
      var theme = 'light'; // 默认浅色主题
      
      // 解析设置
      if (savedSettings) {
        try {
          var settings = JSON.parse(savedSettings);
          theme = settings.theme || 'light';
        } catch (e) {
          // 解析错误，使用默认主题
        }
      }
      
      // 应用主题到documentElement
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'light') {
        document.documentElement.classList.add('light');
      }
      
      // 确保body元素存在后再设置样式
      if (document.body) {
        // 同时设置body的背景色，确保在应用加载前就显示正确的主题色
        if (theme === 'light') {
          document.body.style.backgroundColor = '#f5f5f5';
          document.body.style.color = '#333333';
        } else {
          // 深色主题
          document.body.style.backgroundColor = '#1a1a1a';
          document.body.style.color = '#ffffff';
        }
      } else {
        // 如果body元素还不存在，等待DOM加载完成后再设置
        document.addEventListener('DOMContentLoaded', function() {
          if (document.body) {
            if (theme === 'light') {
              document.body.style.backgroundColor = '#f5f5f5';
              document.body.style.color = '#333333';
            } else {
              document.body.style.backgroundColor = '#1a1a1a';
              document.body.style.color = '#ffffff';
            }
          }
        });
      }
    })();
  </script>
</head>
<body oncontextmenu="return false;">
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
